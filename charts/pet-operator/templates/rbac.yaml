apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pet-operator.fullname" . }}
  labels: {{- include "pet-operator.labels" . | nindent 4 }}
rules:
  # Cat / Dog CRs and their status subresource. The operator must not be
  # able to write spec — leader-election + the CRD's CEL rule defend that
  # invariant.
  - apiGroups: [pets.example.com]
    resources: [cats, dogs]
    verbs: [get, list, watch]
  - apiGroups: [pets.example.com]
    resources: [cats/status, dogs/status]
    verbs: [get, update, patch]
  # Required by controller-runtime leader election.
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch]
  # Standard event recording.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pet-operator.fullname" . }}
  labels: {{- include "pet-operator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pet-operator.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "pet-operator.fullname" . }}
