apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cats.pets.example.com
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: pets.example.com
  scope: Namespaced
  names:
    kind: Cat
    listKind: CatList
    plural: cats
    singular: cat
    shortNames: [cat]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [color, gender, breed]
              # CEL rule below makes spec immutable after creation. self refers
              # to the new spec, oldSelf to the previous one. Using x-kubernetes-
              # validations on the spec object keeps the rule local and the
              # error message clear.
              x-kubernetes-validations:
                - rule: "self == oldSelf"
                  message: "Cat spec is immutable; delete and recreate to change."
              properties:
                color:  { type: string, minLength: 1 }
                gender: { type: string, enum: [male, female] }
                breed:  { type: string, minLength: 1 }
                initialState:
                  type: object
                  required: [isMeowing, isPurring, isHiding]
                  properties:
                    isMeowing: { type: boolean }
                    isPurring: { type: boolean }
                    isHiding:  { type: boolean }
            status:
              type: object
              properties:
                observedGeneration: { type: integer, format: int64 }
                lastTransitionTime: { type: string, format: date-time }
                state:
                  type: object
                  required: [isMeowing, isPurring, isHiding]
                  properties:
                    isMeowing: { type: boolean }
                    isPurring: { type: boolean }
                    isHiding:  { type: boolean }
      additionalPrinterColumns:
        - name: Color
          type: string
          jsonPath: .spec.color
        - name: Breed
          type: string
          jsonPath: .spec.breed
        - name: Gender
          type: string
          jsonPath: .spec.gender
        - name: Meowing
          type: boolean
          jsonPath: .status.state.isMeowing
        - name: Purring
          type: boolean
          jsonPath: .status.state.isPurring
        - name: Hiding
          type: boolean
          jsonPath: .status.state.isHiding
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
