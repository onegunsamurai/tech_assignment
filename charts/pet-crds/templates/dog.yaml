apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dogs.pets.example.com
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: pets.example.com
  scope: Namespaced
  names:
    kind: Dog
    listKind: DogList
    plural: dogs
    singular: dog
    shortNames: [dog]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [color, gender, breed]
              x-kubernetes-validations:
                - rule: "self == oldSelf"
                  message: "Dog spec is immutable; delete and recreate to change."
              properties:
                color:  { type: string, minLength: 1 }
                gender: { type: string, enum: [male, female] }
                breed:  { type: string, minLength: 1 }
                initialState:
                  type: object
                  required: [isBarking, isHungry, isSleeping]
                  properties:
                    isBarking:  { type: boolean }
                    isHungry:   { type: boolean }
                    isSleeping: { type: boolean }
            status:
              type: object
              properties:
                observedGeneration: { type: integer, format: int64 }
                lastTransitionTime: { type: string, format: date-time }
                state:
                  type: object
                  required: [isBarking, isHungry, isSleeping]
                  properties:
                    isBarking:  { type: boolean }
                    isHungry:   { type: boolean }
                    isSleeping: { type: boolean }
      additionalPrinterColumns:
        - name: Color
          type: string
          jsonPath: .spec.color
        - name: Breed
          type: string
          jsonPath: .spec.breed
        - name: Gender
          type: string
          jsonPath: .spec.gender
        - name: Barking
          type: boolean
          jsonPath: .status.state.isBarking
        - name: Hungry
          type: boolean
          jsonPath: .status.state.isHungry
        - name: Sleeping
          type: boolean
          jsonPath: .status.state.isSleeping
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
