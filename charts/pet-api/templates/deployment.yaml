apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pet-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "pet-api.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "pet-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "pet-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pet-api.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.podAntiAffinityPreferred }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: {{- include "pet-api.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--addr=:8080"
            - "--namespace={{ .Values.namespace }}"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
