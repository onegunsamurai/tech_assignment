# Protected file patterns — one glob per line, `#` for comments.
# Matched against both basename and full path of files targeted by Edit/Write.
# Blocks the tool call with an explanatory error.
#
# Extend this list with paths that are:
#   - Secrets (env files, keys, certificates)
#   - Auto-generated from a source of truth (clients, schemas, lock files)
#   - Otherwise dangerous for an agent to edit directly

# Secrets and credentials
.env
.env.*
*.pem
*.key
*.p12
*.pfx
id_rsa
id_rsa.*
id_ed25519
id_ed25519.*
credentials.json
secrets.yaml
secrets.yml

# Lock files — edit through the package manager, not by hand
# (uncomment the ones your project uses)
# package-lock.json
# yarn.lock
# pnpm-lock.yaml
# bun.lockb
# Cargo.lock
# poetry.lock
# uv.lock
# Gemfile.lock
# go.sum

